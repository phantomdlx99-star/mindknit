<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Mini node network icon -->
  <!-- Center node -->
  <circle cx="20" cy="40" r="4" fill="url(#logoGrad)" />
  <!-- Top node -->
  <circle cx="20" cy="22" r="2.5" fill="#6366f1" opacity="0.85" />
  <!-- Right node -->
  <circle cx="32" cy="34" r="2.5" fill="#8b5cf6" opacity="0.85" />
  <!-- Bottom node -->
  <circle cx="20" cy="58" r="2.5" fill="#6366f1" opacity="0.85" />
  <!-- Left node -->
  <circle cx="8" cy="34" r="2.5" fill="#8b5cf6" opacity="0.85" />
  
  <!-- Connecting lines -->
  <line x1="20" y1="40" x2="20" y2="22" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6" stroke-linecap="round" />
  <line x1="20" y1="40" x2="32" y2="34" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6" stroke-linecap="round" />
  <line x1="20" y1="40" x2="20" y2="58" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6" stroke-linecap="round" />
  <line x1="20" y1="40" x2="8" y2="34" stroke="url(#logoGrad)" stroke-width="1" opacity="0.6" stroke-linecap="round" />
  
  <!-- MindKnit Text -->
  <text x="55" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" font-style="italic" fill="url(#logoGrad)" letter-spacing="-0.8">MindKnit</text>
</svg>